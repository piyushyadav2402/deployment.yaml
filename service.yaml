apiVersion: v1
kind: Service
metadata:
  name: my-nginx-service
spec:
  type: NodePort   # for Minikube / local access
  selector:
    app: nginx     # MUST match deployment labels
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30007   # optional (can remove if you want auto-assign)
